<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Cinema Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body, #map { height: 100%; margin: 0; padding: 0; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Fiksna lokacija jedinog bioskopa (mora biti ista kao u CinemaMapActivity.java)
        var cinemaLat = 44.8206;
        var cinemaLng = 20.4587;
        var cinemaName = "Bioskop \"Kolosej\" Beograd";
        var cinemaAddress = "Karađorđeva 3, Beograd";

        var map = L.map('map').setView([cinemaLat, cinemaLng], 15);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        var marker = L.marker([cinemaLat, cinemaLng]).addTo(map);
        marker.bindPopup("<b>" + cinemaName + "</b><br>" + cinemaAddress).openPopup();
    </script>
</body>
</html>
